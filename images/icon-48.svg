<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2a1f5e"/>
      <stop offset="100%" stop-color="#0d0820"/>
    </radialGradient>
  </defs>
  <circle cx="24" cy="24" r="23" fill="url(#bg)"/>
  <!-- Hourglass top triangle -->
  <polygon points="14,12 34,12 24,24" fill="#f0c040" opacity="0.95"/>
  <!-- Hourglass bottom triangle -->
  <polygon points="14,36 34,36 24,24" fill="#f0c040" opacity="0.6"/>
  <!-- Horizontal bars -->
  <line x1="13" y1="12" x2="35" y2="12" stroke="#f0c040" stroke-width="2" stroke-linecap="round"/>
  <line x1="13" y1="36" x2="35" y2="36" stroke="#f0c040" stroke-width="2" stroke-linecap="round"/>
  <!-- Sand particle -->
  <circle cx="24" cy="26" r="2" fill="#f0c040"/>
</svg>
